# Thin caller of the shared reusable CI workflow in kaisekidev/.github.
#
# Runs the established tooling (composer check-deps / cs-check / phpstan) across
# the PHP matrix. This package has no test suite yet, so tests + the coverage
# gate are disabled via run-tests: false; drop that override once tests exist.

name: Checks

on:
  pull_request:
  push:
    branches: [master]

jobs:
  checks:
    uses: kaisekidev/.github/.github/workflows/checks.yml@v1
    with:
      run-tests: false
